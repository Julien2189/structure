<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
        }
        body {
            background-color: rgb(60, 65, 65);
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            min-height: 100vh;
            color: rgb(134, 79, 79);
            display: flex;
            flex-direction: column;
        }
        .header{
            border: 1px solid black;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: row;
            height: 100px;
            width: 100%;
        }
        .logo {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 50%;
            
        }

        a {
            color: antiquewhite;
            display: flex;
            text-align:center;
            text-decoration: none;
            
        }
       ul {
            
             display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 10px ;
            padding: 10px;

        }
        li{
            list-style: none;
            padding: 10px;
        }
        .nav {
             display: flex;
            flex-direction: row;
            justify-content: end;
            align-items: center;
            
            width: 50%;
            padding: 10px;
        }
        .titre{
            background-color: blue;
            
        }
        .intro {
            background-color: aqua;
            height: 500px;
        }
        .main {
            display: grid;
            grid-template-columns: 1fr 3fr 1fr;
            height: 100%;
            flex: 1;
            min-height: 500px;
           
        }
        .contenu {
            background-color: blanchedalmond;
        }
        .principal {
            background-color: blueviolet;
        }
        .aside {
            background-color: chocolate;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="" alt="logo">
        </div>
        <div class="nav">
            <nav>
                <ul>
                    <li><a href="">accueil</a></li>
                    <li><a href="">a propos</a></li>
                    <li><a href="">nous contacter</a></li>
                </ul>
            </nav>
        </div>
    </header>
     <section class="titre">
            <h1>Titre</h1>
            <div class="intro"><p>test</p></div>
        </section>
    <main class="main">
       
        <section class="contenu">
            <div></div>
            <p>grid-template-columns</p>
        </section>
        <section class="principal">
            <div>
                <h2>test</h2>
            </div>
        </section>
        <aside class="aside">
            <div>
                <h3>Sommaire</h3>
            </div>
        </aside>    
    </main>
    <aside class="aside-global"></aside>
    <footer>
              <p>© <span id="year"></span> JLQ Développement. Tous droits réservés.</p>

    </footer>
</body>
</html>
